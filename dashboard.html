<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAFE-Action — Donor Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #B22234; --blue: #3C3B6E; --white: #fff;
      --gold: #C9A84C; --gold-light: #E8D48B;
      --bg: #0a0c1a; --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: #fff;
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh; padding: 32px 24px 60px;
    }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 16px;
      border-bottom: 2px solid var(--border); padding-bottom: 24px; margin-bottom: 32px;
    }
    .logo { font-family: 'Merriweather', serif; font-size: 1.5rem; font-weight: 900; }
    .logo .safe { color: var(--red); } .logo .action { color: #fff; }
    .live-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(178,34,52,0.2); border: 2px solid rgba(178,34,52,0.5);
      border-radius: 100px; padding: 4px 14px;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: var(--red);
      text-transform: uppercase;
    }
    .live-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Stats row */
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 16px; text-align: center;
    }
    .stat-val { font-size: 2rem; font-weight: 800; color: var(--gold); }
    .stat-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: rgba(255,255,255,0.5); margin-top: 4px; }

    /* Donor feed */
    .section-title {
      font-family: 'Merriweather', serif; font-size: 1rem; font-weight: 900;
      color: var(--gold); text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .donor-feed { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
    .donor-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      animation: fadeUp 0.4s ease-out;
    }
    .donor-item.new { border-left: 4px solid var(--red); background: rgba(178,34,52,0.08); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .donor-platform { font-size: 1.4rem; flex-shrink: 0; }
    .donor-name { font-weight: 800; font-size: 0.95rem; }
    .donor-amount { margin-left: auto; font-weight: 900; font-size: 1.1rem; color: var(--gold); }
    .donor-msg { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 2px; font-style: italic; }
    .donor-time { font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-top: 2px; }

    /* Stripe Alert Overlay */
    #donation-alert {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at center, rgba(178,34,52,0.35) 0%, rgba(0,0,0,0.92) 60%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0; transition: opacity 0.5s;
      font-family: 'Open Sans', sans-serif;
    }
    #donation-alert.show { opacity: 1; }
    .alert-wrap { text-align: center; padding: 40px; }
    .alert-badge {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(178,34,52,0.2); border: 2px solid rgba(178,34,52,0.6);
      border-radius: 100px; padding: 8px 24px; margin-bottom: 24px;
      font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--red);
    }
    .alert-name {
      font-family: 'Merriweather', serif;
      font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 900; color: #fff;
      line-height: 1; margin-bottom: 10px;
      text-shadow: 0 0 40px rgba(178,34,52,0.8), 0 0 80px rgba(178,34,52,0.4);
      animation: namePulse 2s ease-in-out infinite;
    }
    @keyframes namePulse {
      0%,100%{text-shadow:0 0 40px rgba(178,34,52,0.6)} 50%{text-shadow:0 0 80px #B22234, 0 0 160px rgba(178,34,52,0.5)}
    }
    .alert-amount { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; color: var(--gold); margin-bottom: 20px; }
    .alert-message { font-size: 1.2rem; color: rgba(255,255,255,0.75); font-style: italic; margin-bottom: 28px; max-width: 500px; }
    .alert-thanks { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.4); margin-bottom: 28px; }
    .alert-progress-track { width: min(400px, 80vw); height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .alert-progress-bar { height: 100%; background: var(--red); border-radius: 2px; animation: barDrain 20s linear forwards; }
    @keyframes barDrain { from{width:100%} to{width:0%} }

    /* Empty state */
    .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo"><span class="safe">SAFE</span><span class="action">-Action</span></div>
    <div class="live-pill"><div class="live-dot"></div>LIVE DONOR FEED</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="stat-total">$0</div>
      <div class="stat-label">Total Raised</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-count">0</div>
      <div class="stat-label">Donors</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-today">$0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-goal">$10,000</div>
      <div class="stat-label">Monthly Goal</div>
    </div>
  </div>

  <!-- Donor Feed -->
  <div class="section-title">🇺🇸 Recent Donors</div>
  <div class="donor-feed" id="donor-feed">
    <div class="empty">Waiting for donations...</div>
  </div>

  <!-- Stripe Alert Overlay -->
  <div id="donation-alert">
    <div class="alert-wrap">
      <div class="alert-badge">💳 Donation Received</div>
      <div class="alert-name" id="alert-name">—</div>
      <div class="alert-amount" id="alert-amount"></div>
      <div class="alert-message" id="alert-msg"></div>
      <div class="alert-thanks">🇺🇸 Thank you for defending science and democracy!</div>
      <div class="alert-progress-track">
        <div class="alert-progress-bar" id="alert-bar"></div>
      </div>
    </div>
  </div>

  <script>
    const DONATION_DISPLAY_MS = 20000;

    let totalCents = 0, donorCount = 0, todayCents = 0;
    const donors = [];
    let alertTimer = null;

    function fmt(cents) {
      return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 0 });
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = fmt(totalCents);
      document.getElementById('stat-count').textContent = donorCount.toLocaleString();
      document.getElementById('stat-today').textContent = fmt(todayCents);
    }

    function addDonorToFeed(d) {
      const feed = document.getElementById('donor-feed');
      const empty = feed.querySelector('.empty');
      if (empty) empty.remove();

      const el = document.createElement('div');
      el.className = 'donor-item new';
      el.innerHTML = `
        <div class="donor-platform">💳</div>
        <div>
          <div class="donor-name">${d.name}</div>
          ${d.message ? `<div class="donor-msg">"${d.message}"</div>` : ''}
          <div class="donor-time">Just now</div>
        </div>
        <div class="donor-amount">${fmt(d.amountCents)}</div>
      `;
      feed.insertBefore(el, feed.firstChild);

      // Age out "new" styling after 10 seconds
      setTimeout(() => el.classList.remove('new'), 10000);

      // Keep feed to last 20 donors
      while (feed.children.length > 20) feed.lastChild.remove();
    }

    function showDonationAlert(d) {
      const overlay = document.getElementById('donation-alert');
      document.getElementById('alert-name').textContent = d.name;
      document.getElementById('alert-amount').textContent = fmt(d.amountCents);
      document.getElementById('alert-msg').textContent = d.message || '';

      // Reset + restart bar animation
      const bar = document.getElementById('alert-bar');
      bar.style.animation = 'none';
      void bar.offsetHeight;
      bar.style.animation = `barDrain ${DONATION_DISPLAY_MS / 1000}s linear forwards`;

      overlay.classList.add('show');
      clearTimeout(alertTimer);
      alertTimer = setTimeout(() => overlay.classList.remove('show'), DONATION_DISPLAY_MS);
    }

    // Called by webhook receiver or browser console
    window.onDonation = function(d) {
      // d = { name, amountCents, message }
      donors.unshift(d);
      totalCents += d.amountCents;
      todayCents += d.amountCents;
      donorCount++;
      updateStats();
      addDonorToFeed(d);
      showDonationAlert(d);
    };

    // Test from browser console: onDonation({ name: "Jane Smith", amountCents: 2500, message: "Science matters!" })

    // Poll webhook endpoint for new donations (if server exists)
    let lastDonationId = null;
    function pollDonations() {
      fetch('/api/donations/latest')
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (data && data.id && data.id !== lastDonationId) {
            lastDonationId = data.id;
            window.onDonation({
              name: data.name || 'Anonymous',
              amountCents: data.amountCents || 0,
              message: data.message || ''
            });
          }
        })
        .catch(() => {}); // Silently fail if no server
    }
    setInterval(pollDonations, 5000);
  </script>
</body>
</html>
