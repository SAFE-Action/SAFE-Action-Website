name: SAFE Action Intelligence Crawl

on:
  schedule:
    - cron: '0 6 * * *'      # Daily at 6am UTC — full crawl
    - cron: '0 */6 * * *'    # Every 6 hours — news only
  workflow_dispatch:
    inputs:
      mode:
        description: 'Crawl mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - news-only

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install crawler dependencies
        run: |
          cd crawler
          pip install -e .

      - name: Install Playwright browsers (for crawl4ai)
        run: crawl4ai-setup

      - name: Determine crawl mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "06" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=news-only" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ inputs.mode }}" = "news-only" ]; then
            echo "mode=news-only" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      - name: Run crawler
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "news-only" ]; then
            python -m crawler.main --news-only
          else
            python -m crawler.main
          fi

      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update intelligence data (${{ steps.mode.outputs.mode }}) [skip ci]"
          git push
